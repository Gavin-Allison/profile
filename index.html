<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gavin Allison | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="home" style="scroll-margin-top: 1000px; margin-top: 35vh;"></div>
    <div class="mouse-circle"></div>

    <nav class="header">
        <div class="logo">Gavin Allison</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#tech">Tech Stack</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
        <div class="cv-container">
            <a href="resume.pdf" target="_blank" rel="noopener noreferrer">CV</a>
        </div>
    </nav>

    <div class="container">
        <div class="section">
            <h1>Gavin Allison</h1>
            <div class="subtitle">
                Full-Stack Development • Machine Learning • Computer Vision <br>
            </div>
        </div>

        <div class="spacer"></div>

        <div class="section" id="about">
            <h2>About Me</h2>
            <script>
                fetch('about.html')
                    .then(response => response.text())
                    .then(data => {
                        const section = document.getElementById('about');
                        section.insertAdjacentHTML('beforeend', data);
                    });
            </script>
        </div>

        <div class="spacer"></div>

        <div class="section" id="tech">
            <h2>Tech Stack</h2>
        </div>

        <div class="spacer"></div>

        <div class="section" id="projects">
            <h2>Projects</h2>
        </div>

        <div class="spacer"></div>

        <div class="section" id="contact">
            <h2>Contact</h2>
            <p>Email: gavinallison007@gmail.com</p>
            <p>GitHub: <a href="https://github.com/Gavin-Allison">github.com/Gavin-Allison</a></p>
        </div>

    </div>

    <script>
        const circle = document.querySelector('.mouse-circle');
        const sections = document.querySelectorAll('.section, #home');
        const navLinks = document.querySelectorAll('.header a');

        document.addEventListener('mousemove', (e) => {
            circle.style.left = e.clientX + 'px';
            circle.style.top = e.clientY + 'px';
        });

        window.addEventListener('scroll', () => {
            let current = '';
            
            if (window.scrollY < 200) {
                current = 'home';
            } else {
                sections.forEach(section => {
                    const sectionTop = section.offsetTop - 350;
                    if (window.scrollY >= sectionTop) {
                        current = section.getAttribute('id');
                    }
                });
            }

            navLinks.forEach(a => {
                a.classList.remove('active');
                if (a.getAttribute('href').substring(1) === current) {
                    a.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
